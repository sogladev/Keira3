@if (config && config.options) {
  <div class="modal-body">
    <div class="row">
      <div class="col-12">
        <p class="lead text-center mb-1">
          Options selection: <strong>{{ config.name }}</strong>
        </p>
      </div>
      <div class="col-12">
        <p class="text-muted">
          Current: <strong>{{ value }}</strong>
        </p>
      </div>
    </div>

    <div class="table-wrapper">
      <table class="table table-striped table-bordered table-sm" id="options-table">
        <thead>
          <tr>
            <th></th>
            <th>Value</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody>
          @for (opt of config.options; track opt) {
            <tr>
              <td>
                <ui-switch
                  [checked]="selectedMap[opt.value === null ? '' : opt.value]"
                  (change)="toggleOption(opt.value)"
                  [id]="'switch-opt-' + (opt.value === null ? '' : opt.value)"
                />
              </td>
              <td class="text-center">{{ opt.value }}</td>
              <td>{{ opt.name }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
}

<div class="modal-footer">
  <button type="button" class="btn btn-danger" id="modal-cancel-btn" (click)="onCancel()" [translate]="'CANCEL'"></button>
  <button type="button" class="btn btn-success" id="modal-select-btn" (click)="onSave()" [translate]="'SELECT'"></button>
</div>
